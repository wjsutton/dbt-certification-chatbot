).\n  2. **Intermediate** ŌĆö stack layers of logic with clear, specific purposes to prepare staging models to join into entities (`int_*` models).\n  3. **Marts** ŌĆö bring the modular pieces together into wide, rich, business-conformed entities (e.g. `orders`, `customers`).\n- Example project (Jaffle Shop) has sources `jaffle_shop` (transactional replica) and `stripe` (payments), organized as `models/staging/<source>/`, `models/intermediate/<domain>/`, `models/marts/<domain>/`.\n- Other top-level folders: `seeds/`, `macros/`, `snapshots/`, `tests/`, `analyses/`, plus `dbt_project.yml` and `packages.yml`.\n- YAML files are co-located per folder (`_<source>__sources.yml`, `_<domain>__models.yml`).\n\n## Exam-relevant tokens\n`models/`, staging, intermediate, marts, source-conformed, business-conformed, `stg_`, `int_`, `base/`, modular layers, DRY, `seeds/`, `macros/`, `snapshots/`, `tests/`, `analyses/`\n\n## Gotchas\n- Intermediate models are optional ŌĆö use them only when logic gets complex or reusable.\n- The whole point of layering is \"apply each transformation in only one place\" ŌĆö that is the DRY argument for the logical flow staging ŌåÆ intermediate ŌåÆ marts.\n\nSource: [How we structure our dbt projects](https://docs.getdbt.com/best-practices/how-we-structure/1-guide-overview) ┬Ę raw: `docs__best-practices__how-we-structure__1-guide-overview.md`"}, {"id": "incremental-microbatch", "title": "About microbatch incremental models", "url": "https://docs.getdbt.com/docs/build/incremental-microbatch", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# About microbatch incremental models ŌĆö summary\n\n**What it covers:** the `microbatch` incremental strategy for large time-series data ŌĆö its configs (event_time, batch_size, begin, lookback) and batch behavior.\n\n## Key points\n- Available for dbt **Latest** and dbt Core **v1.9+**. Designed for **large time-series datasets**; processes the model in multiple time-bounded **batches** instead of one query.\n- Relies solely on an **`event_time`** column to define time ranges for filtering. Set `event_time` on the microbatch model **and on any direct parents** you want filtered (this differs from `partition_by`). Each batch is **independent and idempotent**, enabling backfills, parallel batch execution, and per-batch retry.\n- **Configs:**\n  - **`event_time`** (Required) ŌĆö the column indicating when the row occurred. Required on the model and on direct parents to be filtered.\n  - **`begin`** (Required) ŌĆö the \"beginning of time\" / start point for initial or full-refresh builds.\n  - **`batch_size`** (Required) ŌĆö granularity of batches: `hour`, `day`, `month`, or `year`.\n  - **`lookback`** (Optional, default `1`) ŌĆö process X batches prior to the latest bookmark to capture late-arriving records.\n  - **`concurrent_batches`** (Optional, default `None`) ŌĆö `true` runs batches in parallel, `false` sequentially; otherwise auto-detected.\n- Configure with `incremental_strategy='microbatch'` alongside `materialized='incremental'`. dbt auto-filters upstream `ref`/`source` that define `event_time` based on `lookback` and `batch_size`.\n- `dbt run --full-refresh` on a microbatch model only reloads data if a `begin` config is set. To process from the dataset start you must set `begin` (or use the `--event-time-start` flag).\n- Adapter-specific full-batch replacement: postgresŌåÆ`merge`; redshift/snowflakeŌåÆ`delete+insert`; bigquery/sparkŌåÆ`insert_overwrite`; databricksŌåÆ`replace_where`.\n\n## Exam-relevant tokens\n`incremental_strategy='microbatch'`, `event_time`, `begin`, `batch_size` (`hour`/`day`/`month`/`year`), `lookback`, `concurrent_batches`, `--event-time-start`, `materialized='incremental'`.\n\n## Gotchas\n- `event_time`, `begin`, and `batch_size` are all **required**; `lookback`/`concurrent_batches` are optional.\n- Set `event_time` on upstream parents too, or they won't be filtered per batch (e.g. dimension tables get a full scan).\n- `--full-refresh` won't reset/reload a microbatch model unless `begin` is configured.\n\nSource: [About microbatch incremental models](https://docs.getdbt.com/docs/build/incremental-microbatch) ┬Ę raw: `docs__docs__build__incremental-microbatch.md`"}, {"id": "incremental-models-overview", "title": "About incremental models", "url": "https://docs.getdbt.com/docs/build/incremental-models-overview", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# About incremental models ŌĆö summary\n\n**What it covers:** what incremental materialization is, when to use it, and how dbt implements it across databases.\n\n## Key points\n- Incremental models are a **materialization** that only transforms/loads **new or changed data** since the last run, instead of reprocessing the whole dataset ŌĆö reducing build time and resources.\n- **When to use:** large datasets (millions/billions of rows) or expensive/complex transforms (Regex, UDFs) where `table` materialization is too costly. Recommended when dbt runs become too slow; they require extra configuration (an advanced usage).\n- **How it works across databases:** where supported, a **`merge`** statement inserts new records and updates existing ones. On warehouses without `merge`, dbt implements it with a `delete` (rows to update) followed by an `insert`.\n- Transaction management (on supporting platforms) treats actions as one unit of work; on failure dbt rolls back open transactions to restore a good state.\n\n## Exam-relevant tokens\nincremental materialization, new/changed data, `merge`, `delete`+`insert`, `table`/`view`, transaction rollback, `unique_key`.\n\n## Gotchas\n- Incremental models trade extra configuration complexity for performance ŌĆö only reach for them when runs are slow / datasets are large.\n- On platforms without `merge`, dbt emulates it via delete-then-insert.\n\nSource: [About incremental models](https://docs.getdbt.com/docs/build/incremental-models-overview) ┬Ę raw: `docs__docs__build__incremental-models-overview.md`"}, {"id": "incremental-strategy", "title": "About incremental strategy", "url": "https://docs.getdbt.com/docs/build/incremental-strategy", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# About incremental strategy ŌĆö summary\n\n**What it covers:** choosing and configuring an `incremental_strategy` (append, merge, delete+insert, insert_overwrite, microbatch) and their behaviors.\n\n## Key points\n- Strategy choice depends on data volume, reliability of your `unique_key`, and adapter feature support. Set via `incremental_strategy` in `dbt_project.yml` (`+incremental_strategy:`) or in the model `config(...)`.\n- **Built-in strategies and behavior:**\n  - **`append`** ŌĆö simply inserts selected records; **doesn't check for duplicates** (same source record inserted again ŌćÆ duplicate rows). Low cost.\n  - **`merge`** ŌĆö inserts new keys and **updates** existing keys (mirrors SCD1). Needs a `unique_key`; **without `unique_key`, `merge` behaves like `append`**. Can resolve duplicates. Scans the whole destination, so best for smaller/incremental tables.\n  - **`delete+insert`** ŌĆö deletes rows for the `unique_key` then inserts; fully replaces matched records. Useful when `unique_key` isn't truly unique or `merge` is unsupported. (Use snapshots for SCD2, not delete+insert.)\n  - **`insert_overwrite`** ŌĆö replaces entire **partitions** wholesale (not row-level); ideal for date-partitioned tables.\n  - **`microbatch`** ŌĆö splits large time-series data into time-based batches via `event_time`.\n- Strategy-specific configs (merge): `merge_update_columns` (update only these columns) or `merge_exclude_columns` (exclude these). Built-in strategies map to macros e.g. `get_incremental_merge_sql`, `get_incremental_append_sql`, `get_incremental_microbatch_sql`. Custom strategies = macro `get_incremental_STRATEGY_sql` + `incremental_strategy: STRATEGY`.\n- Adapter support varies, e.g. BigQuery supports `merge` + `insert_overwrite` (not `append`/`delete+insert`); Snowflake supports `append`/`merge`/`delete+insert`/`insert_overwrite`/`microbatch`.\n\n## Exam-relevant tokens\n`incremental_strategy`, `append`, `merge`, `delete+insert`, `insert_overwrite`, `microbatch`, `unique_key`, `merge_update_columns`, `merge_exclude_columns`, `get_incremental_merge_sql`.\n\n## Gotchas\n- `merge` without a `unique_key` behaves like `append`.\n- `append` does NOT dedupe ŌĆö duplicate source rows are inserted again.\n- For SCD2 history use snapshots, not `delete+insert`; `insert_overwrite` replaces whole partitions, not individual rows.\n\nSource: [About incremental strategy](https://docs.getdbt.com/docs/build/incremental-strategy) ┬Ę raw: `docs__docs__build__incremental-strategy.md`"}, {"id": "materializations-1-guide-overview", "title": "Materializations best practices", "url": "https://docs.getdbt.com/best-practices/materializations/1-guide-overview", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# Materializations best practices (overview) ŌĆö summary\n\n**What it covers:** what materializations are conceptually and the tiered guiding principle for the three core ones.\n\n## Key points\n- Materializations are the configs that tell dbt **how to construct objects** in the warehouse when you `dbt build`.\n- They make transformation **declarative** ŌĆö they abstract away DDL/DML, so you declare what you want and dbt figures out the how given the warehouse.\n- The three main/core materializations that ship with dbt are **table**, **view**, and **incremental** ŌĆö they cover most analytics-engineering situations.\n- You can configure materializations at various scopes, from an individual model up to an entire folder.\n- **Guiding principle: start as simple as possible**, follow a tiered approach, only moving up a tier when necessary:\n  - **Start with a view.** When the view gets too long to *query* for end users ŌåÆ\n  - **Make it a table.** When the table gets too long to *build* in your dbt jobs ŌåÆ\n  - **Build it incrementally** ŌĆö layer the data on in chunks as it comes in.\n\n## Exam-relevant tokens\n`table`, `view`, `incremental`, materializations, declarative, folder-level config, tiered approach\n\n## Gotchas\n- The escalation trigger differs per tier: views escalate on **query** time, tables escalate on **build** time.\n- Always start simple (view) and only escalate when there's an actual performance problem.\n\nSource: [Materializations best practices](https://docs.getdbt.com/best-practices/materializations/1-guide-overview) ┬Ę raw: `docs__best-practices__materializations__1-guide-overview.md`"}, {"id": "materializations-5-best-practices", "title": "Best practices for materializations", "url": "https://docs.getdbt.com/best-practices/materializations/5-best-practices", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# Best practices for materializations ŌĆö summary\n\n**What it covers:** which materialization to use per project layer and how to set them DRY at folder level with the Golden Rule.\n\n## Key points\n- **Views** return the freshest, real-time state of input data when queried ŌåÆ ideal as **building blocks** for larger models (you don't want inputs at mixed freshness), and for small datasets needing near real-time access.\n- **Tables** are the **most performant** (already-transformed, no reprocessing) ŌåÆ good for things end users touch (a mart serving a dashboard) and for frequently used, compute-intensive transformations (\"freezing\" them).\n- **Incremental models** serve the **same purposes as tables** but for **larger datasets** so they can be built *and* accessed performantly.\n- **Project-level config:** set materializations at the **folder level** in `dbt_project.yml` under `models:`, override per-model as needed ŌåÆ keeps code DRY.\n- Folder-level configs are the same ones passed to `{{ config() }}`, applied to **every model in that directory and any nested subdirectories**.\n- Use the **`+` prefix** to distinguish a **config** from a folder name (`+materialized` is a config; `marketing`/`paid_ads`/`google` are folders).\n- Configs **cascade** ŌĆö the **more specific scope wins** (a deeper subfolder's `+materialized` overrides a parent's).\n- **Staging ŌåÆ views** (default; the building blocks that stay in sync with sources).\n- **Intermediate ŌåÆ ephemeral** (no warehouse object; interpolated as a CTE into referencing models). Caveat: harder to troubleshoot ŌĆö materialize as views in a restricted custom schema if you need to inspect them.\n- **Marts ŌåÆ table or incremental** (frequently accessed by end users, need performance; choose `table` for whole-table or `incremental` for chunked).\n- **Golden Rule of Materializations:** start as **views**; when too slow to *query*, make them **tables**; when tables are too slow to *build*, make them **incremental**.\n\n## Exam-relevant tokens\n`+materialized`, `models:`, `view`, `table`, `incremental`, `ephemeral`, `+` prefix, cascade / most-specific-wins, staging, intermediate, marts, Golden Rule\n\n## Gotchas\n- The `+` prefix is what distinguishes a config key from a folder name in `dbt_project.yml`.\n- Cascading means a nested subfolder config overrides a parent folder config.\n- Ephemeral intermediate models have no queryable object ŌĆö inspect by temporarily making them views.\n\nSource: [Best practices for materializations](https://docs.getdbt.com/best-practices/materializations/5-best-practices) ┬Ę raw: `docs__best-practices__materializations__5-best-practices.md`"}, {"id": "materializations", "title": "Materializations", "url": "https://docs.getdbt.com/docs/build/materializations", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# Materializations ŌĆö summary\n\n**What it covers:** the five built-in materialization strategies, how to configure them, and their pros/cons.\n\n## Key points\n- Five built-in materializations: `table`, `view`, `incremental`, `ephemeral`, `materialized_view` (plus custom materializations).\n- **Default materialization is `view`.** Set a different one with the `materialized` config.\n- Three ways to configure: in `dbt_project.yml` under `models:` with `+materialized:` (folder-level, cascades to subfolders); inline in the model SQL via `{{ config(materialized='table', ...) }}`; or in the model's properties `.yml` under `config: { materialized: ... }`.\n- **View** ŌĆö rebuilt as a view each run via `create view as`. Pro: no extra storage, always latest records. Con: slow to query if heavy transformation or stacked views. Advice: start here, switch only on performance problems.\n- **Table** ŌĆö rebuilt as a table each run via `create table as`. Pro: fast to query. Con: slow to rebuild; new source records aren't added until next run. Advice: use for BI-queried models and slow transformations reused downstream.\n- **Incremental** ŌĆö inserts/updates records since the model last ran. Pro: big reduction in build time (only new records). Con: extra config, advanced usage. Advice: best for event-style data; adopt when `dbt run`s get too slow (don't start here).\n- **Ephemeral** ŌĆö not built into the DB; dbt interpolates the model's code into dependents as a **CTE** (identifier prefixed with `__dbt__cte__`). Pro: reusable logic, keeps warehouse clean. Con: can't `select` from it directly; can't be `ref()`'d by operations/run-operation; harder to debug; no model contracts. Advice: light early-DAG transformations used in one or two downstream models.\n- **Materialized view** ŌĆö `materialized_view`; a view/table hybrid, similar use cases to incremental; uses `on_configuration_change`; `dbt run` acts as a deploy (like a view), with the platform handling data refresh. Not supported on every platform (dbt-snowflake uses Dynamic Tables instead).\n- **Python models** support only `table` and `incremental` (not `view`/`ephemeral`); Python isn't allowed for tests/snapshots.\n\n## Exam-relevant tokens\n`table`, `view`, `incremental`, `ephemeral`, `materialized_view`, `materialized`, `+materialized`, `{{ config(materialized='table') }}`, `create view as`, `create table as`, `__dbt__cte__`, `on_configuration_change`\n\n## Gotchas\n- View is the default ŌĆö an unspecified model is a view.\n- Ephemeral models can't be selected from directly and can't be `ref()`'d in operations; ephemeral doesn't support model contracts.\n- Python models can't be `view` or `ephemeral`.\n\nSource: [Materializations](https://docs.getdbt.com/docs/build/materializations) ┬Ę raw: `docs__docs__build__materializations.md`"}, {"id": "methods", "title": "Node selector methods", "url": "https://docs.getdbt.com/reference/node-selection/methods", "domain": "07 ŌĆö Leveraging the dbt state", "text": "# Node selector methods ŌĆö summary\n\n**What it covers:** the full set of `method:value` selectors for `--select`/`--exclude`. For Domain 07 the headline method is **`state:`**; the rest are general node-selection knowledge that also appears across Domains 01 and 05.\n\n## The `state:` method (exam-critical for Domain 07)\n\nRequires a comparison manifest via `--state` (or `DBT_ENGINE_STATE` in 1.11).\n\n- `state:new` ŌĆö no node with the same `unique_id` in the comparison manifest.\n- `state:modified` ŌĆö all new nodes **plus** any changed existing nodes.\n- `state:old` ŌĆö node with the same `unique_id` exists in the comparison manifest.\n- `state:unmodified` ŌĆö existing nodes with no changes.\n\nSubselectors narrow `modified`: `state:modified.body`, `.configs`, `.relation`,\n`.persisted_descriptions`, `.macros`, `.contract`. Note `state:modified.contract`\nflags column name/data_type changes ŌĆö removing/retyping a column is a **breaking change** (errors).\n\nRelated state-aware methods: **`result:`** (`result:error`, `result:fail`) selects by prior-run outcome (needs `--state`); **`source_status:fresher+`** selects by source freshness vs prior `sources.json`.\n\n## Other methods worth knowing (cross-domain)\n\n`tag:`, `config.<key>:` (e.g. `config.materialized:incremental`), `path:`/`file:`/`fqn:`,\n`package:` (and `package:this`), `resource_type:` (model/test/source/exposure/function),\n`source:` (`source:snowplow+`), `exposure:`/`metric:` (parents, use `+`),\n`test_type:` (unit/data/generic/singular), `test_name:`, `unit_test:`, `version:`,\n`group:`, `access:`, `selector:` (beta, references a named YAML selector).\n\n## Exam-relevant tokens\n\n`state:modified`, `state:new`, `state:old`, `state:modified.contract`, `result:fail`,\n`source_status:fresher`, `--state`, `+` (graph operator), `config.materialized:incremental`.\n\n## Gotchas\n\n- `state:` needs a prior manifest; it compares logical definition, not warehouse state.\n- `result:fail` is test-only; use `result:error` for any resource type.\n- Seeds: < 1 MiB modified on content change; Ōēź 1 MiB modified only on path change.\n\nSource: [Node selector methods](https://docs.getdbt.com/reference/node-selection/methods) ┬Ę raw: [`methods.md`](../../raw/docs__reference__node-selection__methods.md)"}, {"id": "model-contracts", "title": "Model contracts", "url": "https://docs.getdbt.com/docs/mesh/govern/model-contracts", "domain": "02 ŌĆö Managing dbt models governance", "text": "# Model contracts ŌĆö summary\n\n**What it covers:** what a model contract is and how dbt enforces the *shape* (column names + data types) of a model before it builds.\n\n## Key points\n\n- A **contract** is a set of upfront \"guarantees\" about the shape of a model's returned dataset. dbt verifies the model produces a dataset matching its contract, or it **fails to build**.\n- Enable enforcement with `enforced: true` under the `contract` config.\n- When enforced, the contract **must** include every column's `name` and `data_type` (where `data_type` matches one your platform understands).\n- If materialized as `table` or `incremental`, you may optionally add [`constraints`](constraints.md) such as `not_null`. (Not available on `view`/`ephemeral`.)\n- Building a contracted model, dbt does two things differently:\n  1. Runs a **\"preflight\" check** that the query returns columns with names + data types matching the YAML ŌĆö **agnostic to column order**.\n  2. Includes column names, data types, and constraints in the **DDL** it submits, and orders columns per the contract.\n- Recommended for **\"public\" models** relied on downstream (other groups/teams/projects; reports/dashboards/exposures).\n\n## Contracts vs tests\n\n- A **contract** defines the **shape** of the dataset; if logic/input doesn't conform, the model **does not build** (build-time guarantee).\n- **Data tests** validate the **content** *after* the model is built; more flexible/configurable (custom severity, `store_failures`), easier to debug.\n- You can sometimes replace a data test with an equivalent **constraint** ŌĆö prerequisites: platform supports/enforces it (most only enforce `not_null`), model is `table`/`incremental`, and a **full contract** (`name` + `data_type` for every column) is defined.\n\n## Exam-relevant tokens\n\n`contract`, `enforced: true`, `name`, `data_type`, `constraints`, `not_null`, preflight check, `table`/`incremental`, `on_schema_change`\n\n## Gotchas\n\n- You **must** define every column ŌĆö contracts apply to **all** columns and require explicit expectations for all of them.\n- A subtle type change (e.g. `boolean`ŌåÆ`integer`) can break downstream queries ŌĆö contracts catch this.\n- Breaking changes vs a previous project state surface a **contract error**; a backwards-incompatible change requires a major version bump.\n\nSource: [Model contracts](https://docs.getdbt.com/docs/mesh/govern/model-contracts) ┬Ę raw: `docs__docs__mesh__govern__model-contracts.md`"}, {"id": "model-versions", "title": "Model versions", "url": "https://docs.getdbt.com/docs/mesh/govern/model-versions", "domain": "02 ŌĆö Managing dbt models governance", "text": "# Model versions ŌĆö summary\n\n**What it covers:** versioning a final dbt model like an API ŌĆö supporting breaking changes with a migration window and deprecation.\n\n## Key points\n\n- A final shared model behaves like an **API**: producers need to change it; consumers need stability. **Model versions** give a migration path for breaking changes.\n- dbt Core **1.6** introduced first-class **deprecating models** via [`deprecation_date`](versions.md). Versions + deprecation let producers *sunset* old models and consumers *migrate*.\n- **When to version:** make a new version for a **breaking change** (removing/renaming a column, changing data type or nullability). For **non-breaking** changes (adding a column, fixing a bug) you do **not** need a new version. Prefer non-breaking changes; bump \"latest\" on a predictable cadence.\n- All versions **preserve the model's original name** and are `ref`'d by that name. By default `ref('dim_customers')` resolves to the **latest** version; pin a version with `ref('dim_customers', v=2)`.\n- Naming convention: file `<model_name>_v<v>` (e.g. `dim_customers_v2.sql`); the **latest** may live in `<model_name>.sql` (no suffix). DB relation alias defaults to `<model_name>_v<v>`.\n- Declare versions under `versions:` with `latest_version:` controlling which is canonical. If `latest_version` is unset, the **numerically/alphabetically highest** version is latest.\n- Versions can be `latest`, `prerelease` (above latest), or `old`. `version`-based selection + YAML selectors can exclude old versions in dev.\n\n## Run / select\n\n- `dbt run --select dim_customers` runs **all** versions.\n- `dbt run --select dim_customers.v2` (or `dim_customers_v2`) runs a specific version.\n- `dbt run -s dim_customers,version:latest` runs only the latest.\n\n## Exam-relevant tokens\n\n`versions`, `latest_version`, `deprecation_date`, `v`, `ref('model', v=2)`, `version:latest`, `version:old`, `<model_name>_v<v>`, `latest_version_pointer` (1.12+)\n\n## Gotchas\n\n- Differs from version control: multiple model versions live **simultaneously** in the same repo/environment (like web APIs), whereas only one project state deploys at a time.\n- `ref` resolves to latest only if no `v` pin; a prerelease version above `latest_version` does **not** auto-resolve.\n- `latest_version_pointer` config (auto view to latest) is **1.12+**; in 1.11 use a custom macro/post-hook or `alias`.\n\nSource: [Model versions](https://docs.getdbt.com/docs/mesh/govern/model-versions) ┬Ę raw: `docs__docs__mesh__govern__model-versions.md`"}, {"id": "packages", "title": "Packages", "url": "https://docs.getdbt.com/docs/build/packages", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# Packages ŌĆö summary\n\n**What it covers:** using dbt packages ŌĆö standalone dbt projects you add as dependencies via `packages.yml`/`dependencies.yml` + `dbt deps`.\n\n## Key points\n- A dbt package is a standalone dbt project (models, macros, resources). Adding it makes its resources part of yours: package models materialize on `dbt run`, and you can `ref`/`source`/use its macros.\n- **Adding a package:** create `packages.yml` or `dependencies.yml` at the same level as `dbt_project.yml`, specify packages, then run **`dbt deps`** to install. Packages install into the `dbt_packages` directory (default `packages-install-path`), which git ignores by default.\n- **Hub packages (recommended):** `package: dbt-labs/snowplow` + `version:` (a version is required); use semantic-version ranges like `version: [\">=0.7.0\", \"<0.8.0\"]`. Hub installs let dbt resolve duplicate transitive dependencies.\n- **Git packages:** `git: \"...\"` + optional `revision:` (branch, tag, or full 40-char commit hash). **Local packages:** `local: relative/path` (monorepos, testing changes). **Tarball:** `tarball:` + `name:`. **Private:** `private:` + `provider:` (`github`/`gitlab`/`ado`).\n- **Pinning:** `dbt deps` \"pins\" packages by writing/updating `package-lock.yml`. Subsequent `dbt deps` install from the lockfile unless `packages.yml`/`dependencies.yml` changed; get updates with `dbt deps --upgrade`.\n- Updating/uninstalling: changing a version needs `dbt deps` to take effect; remove + `dbt clean` then `dbt deps` to fully uninstall. Configure package vars/models via `dbt_project.yml`; project configs override package configs. Unpinned git packages warn unless `warn-unpinned: false`.\n- Note: dbt packages are distinct from Python (PyPI) packages.\n\n## Exam-relevant tokens\n`packages.yml`, `dependencies.yml`, `dbt deps`, `dbt deps --upgrade`, `dbt_packages`, `packages-install-path`, `package:`/`version:`, `git:`/`revision:`, `local:`, `tarball:`/`name:`, `private:`/`provider:`, `package-lock.yml`, `dbt clean`, `warn-unpinned`.\n\n## Gotchas\n- Hub packages **require** a version; git packages should specify a `revision` or dbt warns \"not pinned.\"\n- `dbt deps` pins to `package-lock.yml` ŌĆö later commits/versions are NOT auto-installed; use `dbt deps --upgrade` to refresh.\n- Changing a version in `packages.yml` isn't applied until you re-run `dbt deps`.\n\nSource: [Packages](https://docs.getdbt.com/docs/build/packages) ┬Ę raw: `docs__docs__build__packages.md`"}, {"id": "python-models", "title": "Python models", "url": "https://docs.getdbt.com/docs/build/python-models", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# Python models ŌĆö summary\n\n**What it covers:** authoring dbt Python (`dbt-py`) models that return a DataFrame, referencing upstream resources, and configuring them.\n\n## Key points\n- Each Python model lives in a **`.py`** file in `models/` and defines a function **`def model(dbt, session)`** that must **return a single DataFrame**.\n  - `dbt`: a class compiled by dbt Core unique to each model (project/DAG context).\n  - `session`: the data platform's connection to the Python backend (used to read/write tables as DataFrames).\n- Reference upstream resources with **`dbt.ref(\"model_name\")`** (SQL or Python models) and **`dbt.source(\"source_name\", \"table_name\")`**; these return DataFrames. You can `ref()` a Python model in downstream SQL too.\n- Only specific platforms support `dbt-py` (e.g. Snowflake/Snowpark, BigQuery, Databricks/PySpark). All Python code runs **remotely on the platform**, not locally by dbt.\n- Configure three ways: in `dbt_project.yml`, a dedicated `.yml`, or in-file via **`dbt.config(...)`** (literal values + dynamic config only). Access config with `dbt.config.get(...)`; check incremental with `dbt.is_incremental`; current relation via `dbt.this`; custom meta via `dbt.config.meta_get()`.\n- Python models don't use Jinja to render compiled code; they have limited project context via the `dbt` class.\n- Referencing ephemeral models is not supported.\n\n## Exam-relevant tokens\n`def model(dbt, session)`, `return final_df`, `dbt.ref(...)`, `dbt.source(...)`, `dbt.config(...)`, `dbt.config.get(...)`, `dbt.is_incremental`, `dbt.this`, `dbt.config.meta_get()`, `.py` in `models/`, DataFrame.\n\n## Gotchas\n- The function must be named `model` and take exactly `(dbt, session)`, returning one DataFrame.\n- `dbt.config()` accepts only literal/dynamic values ŌĆö not functions or complex structures (set those in a YAML config).\n- The `--empty` and `--sample` flags are ignored for Python models; ephemeral refs are unsupported.\n\nSource: [Python models](https://docs.getdbt.com/docs/build/python-models) ┬Ę raw: `docs__docs__build__python-models.md`"}, {"id": "refactoring-legacy-sql", "title": "Refactoring legacy SQL to dbt", "url": "https://docs.getdbt.com/guides/refactoring-legacy-sql", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# Refactoring legacy SQL to dbt ŌĆö summary\n\n**What it covers:** the 6-step process for turning legacy SQL/stored procedures into modular dbt models.\n\n## Key points\n- Two parts: **migration** (get it running in dbt) then **refactoring** (make it modular). The six steps:\n  1. **Migrate code 1:1 into dbt** ŌĆö copy the legacy query into a `.sql` file under `/models`, then `dbt run`. Move logic around, but don't change it (more changes = more auditing).\n  2. **Implement sources** rather than referencing raw DB tables ŌĆö use `{{ source('my_source','my_table') }}` instead of `my_database.my_schema.my_table`. This unlocks source freshness reporting, easy dependency tracing (see which queries share raw tables), and the analytics-as-code habit.\n  3. **Choose a refactoring strategy** ŌĆö **in-place** (edit the ported model directly) or **alongside** (copy into `/marts` and edit the copy). dbt Labs generally recommends **alongside**: less end-user impact, smaller PRs, easier auditing (run old vs new side-by-side).\n  4. **Implement CTE groupings + cosmetic cleanup** ŌĆö restructure into a 4-part layout: **Import CTEs** (simple `select * from {{ source() }}`, filters allowed), **Logical CTEs** (unique transformations, one per block, no nesting), a **Final CTE**, then a simple `select * from final`. CTE = Common Table Expression (a temp result set, introduced with `with`).\n  5. **Separate transformations into standardized layers** ŌĆö port CTEs into modular models: identify **staging models** from import CTEs; promote complex/reusable logical CTEs to **intermediate models** (optional); the **final model** produces the result set.\n  6. **Audit output of dbt models vs legacy SQL** ŌĆö use the dbt **`audit_helper`** package to generate before/after comparison queries.\n- Sources also let you remap schemas (e.g. after switching ETL tools) in a single config file via one PR.\n\n## Exam-relevant tokens\n`{{ source() }}`, `/models`, `/marts`, in-place vs alongside, CTE, `with`, Import CTEs, Logical CTEs, Final CTE, `select * from final`, staging models, intermediate models, `audit_helper`, `dbt run`\n\n## Gotchas\n- Migrate logic unchanged first ŌĆö don't fix bugs during the move; card them for later to minimize auditing.\n- **Alongside** is the recommended refactoring strategy (easier to audit / less risk than in-place).\n- Import CTEs should be `select *` (filters optional); avoid nested subqueries ŌĆö each becomes its own CTE.\n\nSource: [Refactoring legacy SQL to dbt](https://docs.getdbt.com/guides/refactoring-legacy-sql) ┬Ę raw: `docs__guides__refactoring-legacy-sql.md`"}, {"id": "retry", "title": "About dbt retry command", "url": "https://docs.getdbt.com/reference/commands/retry", "domain": "07 ŌĆö Leveraging the dbt state", "text": "# dbt retry ŌĆö summary\n\n**What it covers:** re-running the **last invocation from its point of failure**, using the previous run's results.\n\n## Key points\n\n- `dbt retry` reads **`run_results.json`** (in the target dir by default) to find where the last command stopped, and resumes from the failed/ŌĆŗskipped nodes ŌĆö it does **not** re-run already-successful upstream nodes.\n- Behavior edge cases:\n  - If **no nodes ran** before the failure (e.g. a connection/permission error at startup), retry has nothing to resume ŌĆö re-run the full job instead.\n  - If the previous command **succeeded**, retry is a **no-op** (\"Nothing to do\").\n  - Retrying without fixing the underlying error fails again at the same node.\n- **Idempotent:** retrying without changing anything reproduces the same result.\n- **Selection is inherited:** with dbt Core, retry reuses the prior command's `--select`/`--exclude`/`--selector`; you **cannot** override them on retry (Core / dbt platform CLI).\n- Override flags (Core): `--threads`, `--vars`, `--target`, `--profile`, `--profiles-dir`, `--project-dir`, `--target-path`, `--state`, `--full-refresh`.\n- `--state path/` points retry at a different directory containing `run_results.json`.\n\n## Supported commands\n\n`build`, `compile`, `clone`, `docs generate`, `seed`, `snapshot`, `test`, `run`, `run-operation`.\n\n## Exam-relevant tokens\n\n`dbt retry`, `run_results.json`, \"from the point of failure\", inherited selection, idempotent, no-op on success.\n\nSource: [About dbt retry command](https://docs.getdbt.com/reference/commands/retry) ┬Ę raw: [`retry.md`](../../raw/docs__reference__commands__retry.md)"}, {"id": "run", "title": "About dbt run command", "url": "https://docs.getdbt.com/reference/commands/run", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# About dbt run command ŌĆö summary\n\n**What it covers:** `dbt run`, which materializes models only, plus `--full-refresh` and `--empty` behavior.\n\n## Key points\n- `dbt run` applies **only to models** ŌĆö it does NOT run tests, snapshots, or seeds. Use `dbt test`, `dbt snapshot`, `dbt seed`, or `dbt build` for those.\n- Executes compiled SQL against the current `target` database, in dependency-graph order, with multi-threading.\n- For zero-downtime swaps, dbt builds each model under a temporary name then drops/renames within a single transaction (for adapters that support transactions).\n- **`--full-refresh`** (short: **`-f`**) treats incremental models as table models ŌĆö useful when the incremental schema changes or logic changes and you must reprocess everything. Exposed as `flags.FULL_REFRESH`; with it set, `is_incremental()` returns `false` for **all** models.\n- **`--empty`** does a schema-only dry run: limits refs/sources to zero rows, still executes SQL against the warehouse, validating dependencies without expensive input reads.\n- Run status codes (list_runs API): Queued=1, Starting=2, Running=3, Success=10, Error=20, Canceled=30, Skipped=40.\n\n## Exam-relevant tokens\n`dbt run`, `--full-refresh`, `-f`, `flags.FULL_REFRESH`, `is_incremental()`, `--empty`, `target`, `{{ this }}`.\n\n## Gotchas\n- `dbt run` never runs tests/snapshots/seeds ŌĆö a common distractor.\n- `--full-refresh` makes `is_incremental()` return `false`, so the model rebuilds from scratch as a table.\n\nSource: [About dbt run command](https://docs.getdbt.com/reference/commands/run) ┬Ę raw: `docs__reference__commands__run.md`"}, {"id": "sample-flag", "title": "About the --sample flag", "url": "https://docs.getdbt.com/docs/build/sample-flag", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# The `--sample` flag ŌĆö summary\n\n**What it covers:** running dbt in *sample mode* to cut build time and warehouse spend by building models on a time-filtered slice of input data.\n\n## Key points\n\n- `--sample` is available on the **`run`** and **`build`** commands.\n- It builds models against a **time-based sample** of refs and sources ŌĆö a step beyond `--empty` (which builds zero rows): `--sample` includes *some* real data so you can validate outputs, not just dependencies.\n- Sampling is **time-based**, so every sampled `ref`/source must have an **`event_time`** config set to the timestamp column.\n- Two spec forms:\n  - **Relative:** `--sample=\"3 days\"` (granularities: hours, days, months, years).\n  - **Static:** `--sample=\"{'start': '2024-07-01', 'end': '2024-07-08 18:00:00'}\"`.\n- Opt a specific ref **out** of sampling with `.render()`: `{{ ref('stg_customers').render() }}`.\n- Not available for **Python models** (ignored); seeds build normally but are sampled when referenced downstream.\n\n## `--empty` vs `--sample` (exam contrast)\n\n- `--empty` ŌåÆ **zero rows**; validates refs/sources and that models build (schema-only dry run).\n- `--sample` ŌåÆ **a time slice of rows**; validates outputs with real-but-small data. Not all joins will necessarily populate.\n\n## Exam-relevant tokens\n\n`--sample`, `--empty`, `event_time`, `.render()`, relative vs static time spec, `run`/`build` only.\n\nSource: [About the --sample flag](https://docs.getdbt.com/docs/build/sample-flag) ┬Ę raw: [`sample-flag.md`](../../raw/docs__docs__build__sample-flag.md)"}, {"id": "seed", "title": "About dbt seed command", "url": "https://docs.getdbt.com/reference/commands/seed", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# About dbt seed command ŌĆö summary\n\n**What it covers:** `dbt seed`, which loads static CSV files from `seed-paths` into the warehouse as tables.\n\n## Key points\n- `dbt seed` loads static CSV files from your project's `seed-paths` into the warehouse as tables. Use for small, version-controlled reference data (country codes, mappings, categories).\n- Seeds are configured in `dbt_project.yml` (directories, column interpretation). Reference loaded seeds in downstream models; rerun `dbt seed` when CSVs change.\n- Select specific seeds: `dbt seed --select \"country_codes\"`; multiple: `dbt seed --select \"country_codes state_codes\"`.\n- **`--full-refresh`** forces a clean, full reload of seed data (rather than incremental update) ŌĆö use when you changed the seed structure (column names/types) or need consistent behavior across environments. E.g. `dbt seed --full-refresh`.\n- **`--empty`** (from dbt Core v1.12) creates seed tables with the correct inferred schema but **zero rows** ŌĆö a schema-only dry run so downstream models/unit tests can compile/run without loading data. E.g. `dbt seed --empty`. (Not present in 1.11.)\n\n## Exam-relevant tokens\n`dbt seed`, `seed-paths`, `--select`, `--full-refresh`, `--empty` (v1.12+), `dbt_project.yml`, `run_results.json`.\n\n## Gotchas\n- `--full-refresh` rebuilds seed tables from scratch ŌĆö needed after seed column name/type changes.\n- The `--empty` flag for `seed` is a v1.12 addition; on dbt Core 1.11 use `--empty` on `run`/`build`/`snapshot`/`compile`.\n\nSource: [About dbt seed command](https://docs.getdbt.com/reference/commands/seed) ┬Ę raw: `docs__reference__commands__seed.md`"}, {"id": "snapshot", "title": "About dbt snapshot command", "url": "https://docs.getdbt.com/reference/commands/snapshot", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# About dbt snapshot command ŌĆö summary\n\n**What it covers:** the `dbt snapshot` command, which executes snapshots (type-2 SCD) defined in the project.\n\n## Key points\n- `dbt snapshot` executes the snapshots defined in your project, recording changes to source data over time as **type-2 Slowly Changing Dimensions**. Run it on a schedule (e.g. daily) to capture changes.\n- Define snapshots in **YAML** with a `strategy` and `unique_key` (see Snapshot configurations). Snapshots can also run as part of `dbt build`.\n- dbt looks for snapshots in the directories listed in `snapshot-paths` in `dbt_project.yml`; by default the `snapshots/` directory. Multiple paths supported.\n- Use `--select` / `--exclude` to choose which snapshots run; other global flags (`--threads`, `--target`, logging) supported.\n\n## Exam-relevant tokens\n`dbt snapshot`, `dbt build`, type-2 SCD, `strategy`, `unique_key`, `snapshot-paths`, `snapshots/`, `--select`, `--exclude`, `--threads`, `--target`.\n\n## Gotchas\n- Snapshots are configured in YAML (with `strategy` + `unique_key`), not a standalone Jinja-only block in v1.9+.\n- `dbt snapshot` is a write command and runs the same snapshots that `dbt build` would run as part of the DAG.\n\nSource: [About dbt snapshot command](https://docs.getdbt.com/reference/commands/snapshot) ┬Ę raw: `docs__reference__commands__snapshot.md`"}, {"id": "snapshots", "title": "Add snapshots to your DAG", "url": "https://docs.getdbt.com/docs/build/snapshots", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# Add snapshots to your DAG ŌĆö summary\n\n**What it covers:** what snapshots are (type-2 SCD) and how to configure them in YAML with strategy, unique_key, and meta columns.\n\n## Key points\n- Snapshots record changes to a mutable source table over time, implementing **type-2 Slowly Changing Dimensions** ŌĆö preserving history that would otherwise be overwritten.\n- dbt adds meta fields `dbt_valid_from` and `dbt_valid_to` (current record has `dbt_valid_to = NULL` by default).\n- **From v1.9, configure snapshots in YAML** (place files in `models/` or a `snapshots/` directory):\n  ```yaml\n  snapshots:\n    - name: orders_snapshot\n      relation: source('jaffle_shop', 'orders')   # or ref('my_model')\n      config:\n        strategy: timestamp | check\n        unique_key: id\n        updated_at: updated_at        # required for timestamp strategy\n        check_cols: [status] | all    # required for check strategy\n  ```\n- **Required configs:** `strategy` (`timestamp` or `check`) and `unique_key`. `updated_at` is required for the `timestamp` strategy; `check_cols` (a list or `all`) is required for the `check` strategy.\n- Other configs: `database`, `schema`, `alias`, `dbt_valid_to_current`, `snapshot_meta_column_names`, `hard_deletes` (`ignore` default / `invalidate` / `new_record`).\n- Apply transformations by referencing an **ephemeral model** in `relation` instead of `source()` directly.\n- Run with `dbt snapshot` (or via `dbt build`); reference downstream with `{{ ref('orders_snapshot') }}`. In v1.9, `target_schema` became optional (snapshots are environment-aware via `generate_schema_name`).\n\n## Exam-relevant tokens\n`snapshots:`, `relation`, `strategy: timestamp|check`, `unique_key`, `updated_at`, `check_cols`, `all`, `hard_deletes` (`ignore`/`invalidate`/`new_record`), `dbt_valid_from`, `dbt_valid_to`, `dbt_valid_to_current`, `dbt snapshot`.\n\n## Gotchas\n- `timestamp` strategy requires `updated_at`; `check` strategy requires `check_cols`. Timestamp is preferred (handles column add/remove; tracks only one column).\n- Snapshots are now defined in YAML (v1.9+), not legacy Jinja `{% snapshot %}` blocks.\n- For SCD2 use snapshots ŌĆö not the `delete+insert` incremental strategy.\n\nSource: [Add snapshots to your DAG](https://docs.getdbt.com/docs/build/snapshots) ┬Ę raw: `docs__docs__build__snapshots.md`"}, {"id": "source-configs", "title": "Source configurations", "url": "https://docs.getdbt.com/reference/source-configs", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# Source configurations ŌĆö summary\n\n**What it covers:** the configs available on sources and how to set them inline or from `dbt_project.yml`.\n\n## Key points\n- Source configs (v1.9+) support `enabled`, `event_time`, `meta`, and `freshness`.\n- Sources can be configured via a `config:` block inside the `.yml` definition, or under the `sources:` key in `dbt_project.yml`. The `dbt_project.yml` form is most useful for sources imported from a package.\n- In `dbt_project.yml` you use the `+` prefix on configs (`+enabled`, `+event_time`, `+freshness`, `+meta`) and a **resource path** (project ŌåÆ subdirectory ŌåÆ source name ŌåÆ table name) to scope them.\n- **Disable all package sources:** put `+enabled: false` under the project name in the resource path. This prevents them rendering in docs and stops freshness checks on package source tables.\n- **Conditionally enable** a single source/table inline with `config: { enabled: true|false }`; you can use `var()` as input, e.g. `enabled: \"{{ var('my_source_table_enabled', false) }}\"`.\n- **Disable a single source/table from a package** by qualifying the resource path with package name ŌåÆ source name (ŌåÆ table name) and `+enabled: false`.\n- `event_time` marks the column holding the actual event timestamp (not the load date); required for the **incremental microbatch** strategy and used to align CI vs production comparisons.\n- `meta` attaches arbitrary metadata (e.g. `source_system`, `data_owner`).\n- `freshness` config: provide one or both of `warn_after`/`error_after` (each `count` + `period: minute | hour | day`); if neither is given, dbt won't calculate freshness snapshots.\n- You can also override `database`/`schema` on a source via the inline `config`/properties.\n\n## Exam-relevant tokens\n`enabled`, `event_time`, `meta`, `freshness`, `config:`, `+enabled`, `+event_time`, `+freshness`, `+meta`, `warn_after`, `error_after`, `count`, `period`, resource path, `var()`\n\n## Gotchas\n- To disable a source table nested in a subfolder properties file, the resource path in `dbt_project.yml` must include the subfolder(s) as well as source and table name.\n- `event_time` represents the event time, not the loading date ŌĆö required for microbatch.\n\nSource: [Source configurations](https://docs.getdbt.com/reference/source-configs) ┬Ę raw: `docs__reference__source-configs.md`"}, {"id": "source-freshness", "title": "Source freshness", "url": "https://docs.getdbt.com/docs/deploy/source-freshness", "domain": "06 ŌĆö External dependencies", "text": "# Source freshness ŌĆö summary\n\n**What it covers:** The interface and job patterns for snapshotting source data freshness against an SLA, and how freshness fits into deploy jobs.\n\n## Key points\n- dbt provides an interface around source data freshness calculations; when a job snapshots freshness, dbt renders a UI showing the most recent snapshot state ŌĆö used to judge whether sources meet your SLA.\n- **`dbt build` does _not_ include source freshness checks.** You must run freshness separately.\n- Job patterns: add `dbt build` for models/tests; optionally enable **Generate docs on run**; optionally enable the **Run source freshness** checkbox to run freshness as the **first** step.\n- **Run source freshness checkbox:** runs `dbt source freshness` as the first step and **won't break subsequent steps if it fails**. A freshness-only job still needs at least one placeholder step such as `dbt compile`.\n- **Add as a run step:** if source data is out of date, the step **\"fails\" and subsequent steps will not run**; dbt triggers email notifications based on the step's end state. Run it first if you don't want models to run on stale data, otherwise run it last or in a separate job.\n- **Snapshot frequency:** run freshness jobs at least **double the frequency of your lowest SLA** (e.g. 1 hour SLA ŌåÆ snapshot every 30 mins; 1 day ŌåÆ 12 hours; 1 week ŌåÆ about daily).\n- Source freshness for Snowflake is calculated using the `LAST_ALTERED` column.\n\n## Exam-relevant tokens\n`dbt source freshness`, `dbt build` (excludes freshness), `dbt compile` (placeholder step), Run source freshness checkbox, SLA, `LAST_ALTERED`\n\n## Gotchas\n- A common exam trap: **`dbt build` does not run source freshness** ŌĆö you need `dbt source freshness` explicitly.\n- Checkbox vs run-step differ: the checkbox won't break later steps on failure; a freshness command added as a run step **will** stop the job if sources are stale.\n- A freshness-only job still requires a placeholder step (e.g. `dbt compile`).\n\nSource: [Source freshness](https://docs.getdbt.com/docs/deploy/source-freshness) ┬Ę raw: `docs__docs__deploy__source-freshness.md`"}, {"id": "source", "title": "About dbt source command", "url": "https://docs.getdbt.com/reference/commands/source", "domain": "06 ŌĆö External dependencies", "text": "# About dbt source command ŌĆö summary\n\n**What it covers:** The `dbt source` command and its single subcommand `dbt source freshness`, including output artifacts and source selection.\n\n## Key points\n- `dbt source` provides one subcommand: **`dbt source freshness`**.\n- If the project is configured with sources, `dbt source freshness` **queries all defined source tables** to determine freshness. If a table is stale (per its `freshness` config), dbt reports a **warning or error**, and a stale source causes dbt to **exit with a nonzero exit code**.\n- Freshness is configured under `sources:` ŌåÆ `config:` ŌåÆ `freshness:` with `warn_after: {count, period}` and `error_after: {count, period}`, plus `loaded_at_field` (changed to `config` in v1.9 / v1.10). `freshness` can be overridden per `table` and disabled with `freshness: null`.\n- **Output artifact:** when it completes, a JSON file is written to **`target/sources.json`** with `max_loaded_at`, `snapshotted_at`, `max_loaded_at_time_ago_in_s`, `state` (e.g. `pass`), and the `criteria` (`warn_after`/`error_after`).\n- Override the output path with **`-o` / `--output`**, e.g. `dbt source freshness --output target/source_freshness.json`.\n- **Select a subset** with `--select` using the `source:` method: `--select \"source:snowplow\"` (all tables) or `--select \"source:snowplow.event\"` (one table). By default it calculates freshness for all sources.\n- Recommended to run on a schedule and store snapshots over time so SLA violations can be alerted and trends tracked.\n\n## Exam-relevant tokens\n`dbt source freshness`, `--select \"source:<name>\"`, `source:<name>.<table>`, `-o` / `--output`, `target/sources.json`, `warn_after`, `error_after`, `count`, `period`, `loaded_at_field`, `filter`, `freshness: null`, `state` (`pass`)\n\n## Gotchas\n- A stale source makes `dbt source freshness` exit **nonzero** ŌĆö this is what fails a run-step in a job.\n- Default output path is `target/sources.json`; use `--output`/`-o` to redirect.\n- `dbt source` has exactly one subcommand (`freshness`) ŌĆö there is no separate freshness command outside `dbt source`.\n\nSource: [About dbt source command](https://docs.getdbt.com/reference/commands/source) ┬Ę raw: `docs__reference__commands__source.md`"}, {"id": "sources", "title": "Add sources to your DAG", "url": "https://docs.getdbt.com/docs/build/sources", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# Add sources to your DAG ŌĆö summary\n\n**What it covers:** declaring raw warehouse tables as dbt sources, selecting from them with `{{ source() }}`, and configuring source freshness.\n\n## Key points\n- Sources name/describe data loaded by EL tools so you can select from them, test assumptions, and calculate freshness.\n- Defined in `.yml` files under a `sources:` key with `name`, `database`, `schema`, and `tables:`. By default `schema` equals the source `name`; set `schema` only if they differ.\n- Select with `{{ source('jaffle_shop', 'orders') }}` ŌĆö dbt compiles it to the full table name (e.g. `raw.jaffle_shop.orders`) and this creates a dependency between the model and the source table (the raw object dependency in the DAG).\n- You can add data tests (e.g. `unique`, `not_null`) and descriptions to sources, just like models.\n- **Source freshness:** add a `freshness` block plus `loaded_at_field` to the source/table. One or both of `warn_after` and `error_after` (each `{count, period}`); if neither is given, dbt does not calculate freshness. `loaded_at_field` is required to calculate freshness (unless warehouse metadata can be leveraged).\n- Freshness configs apply hierarchically ŌĆö values set at the `source` level flow down to all its `tables`; a table can override or set `freshness: null` to skip.\n- In v1.9 `freshness` moved under `config:`; in v1.10 `loaded_at_field` moved under `config:`.\n- Check freshness with `dbt source freshness`; dbt builds a `select max(loaded_at_field) ... as max_loaded_at, current_timestamp as calculated_at` query.\n- Build downstream of fresher sources: `dbt build --select source_status:fresher+`.\n- A `filter` argument can be added to the freshness config to avoid full table scans (e.g. `filter: _etl_loaded_at >= date_sub(current_date(), interval 1 day)`).\n\n## Exam-relevant tokens\n`sources:`, `{{ source() }}`, `source('name','table')`, `database`, `schema`, `tables:`, `freshness`, `loaded_at_field`, `warn_after`, `error_after`, `count`, `period`, `dbt source freshness`, `source_status:fresher+`, `filter`\n\n## Gotchas\n- Using `{{ source() }}` (not a hard-coded `db.schema.table`) is what registers the dependency/lineage.\n- No `loaded_at_field` (or warehouse-metadata alternative) ŌćÆ no freshness calculated for that table.\n- `freshness: null` on a table opts it out of freshness checks even when the source defines defaults.\n\nSource: [Add sources to your DAG](https://docs.getdbt.com/docs/build/sources) ┬Ę raw: `docs__docs__build__sources.md`"}, {"id": "state-selection", "title": "About local state in dbt", "url": "https://docs.getdbt.com/reference/node-selection/state-selection", "domain": "07 ŌĆö Leveraging the dbt state", "text": "# About local state in dbt ŌĆö summary\n\n**What it covers:** what \"state\" means in dbt, and the `--state` flag that unlocks state-aware operations.\n\n## Key points\n\n- dbt operations are **stateless** and **idempotent**: given the same code, manifest, and raw data, a run produces the same result regardless of history.\n- dbt nonetheless *stores* state ŌĆö a point-in-time view of nodes, database objects, and invocation results ŌĆö in its **artifacts** (chiefly `manifest.json`).\n- You make a prior run's artifacts available by passing their directory to the **`--state`** flag. This is the prerequisite for three features:\n  - the **`state:` selector** (`state:modified`, `state:new`) ŌĆö selects resources that changed vs. the state manifest;\n  - **deferral** (`--defer`) ŌĆö resolve unbuilt upstream `ref`s to another environment;\n  - **`dbt clone`** ŌĆö clone nodes based on their location in the state manifest.\n- The `state:` selector + deferral together enable **\"Slim CI\"** (build/test only modified models against production state).\n\n## Exam-relevant tokens\n\n`--state path/`, `state:modified`, `state:new`, `state:old`, `manifest.json`, \"Slim CI\", stateless, idempotent.\n\n## Gotchas\n\n- State selection compares against **whatever manifest you point `--state` at** ŌĆö usually production. Stale or wrong artifacts give misleading \"modified\" sets.\n- State is a *prerequisite flag*, not a command: it modifies `run`/`build`/`test`/`clone`, etc.\n\nSource: [About local state in dbt](https://docs.getdbt.com/reference/node-selection/state-selection) ┬Ę raw: [`state-selection.md`](../../raw/docs__reference__node-selection__state-selection.md)"}, {"id": "syntax", "title": "Node selection syntax overview", "url": "https://docs.getdbt.com/reference/node-selection/syntax", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# Node selection syntax overview ŌĆö summary\n\n**What it covers:** how `--select`/`--exclude` choose a subset of DAG nodes, and the graph-operator shorthand for traversing the DAG.\n\n## Key points\n- Node selection runs subsets of resources for: `run`, `test`, `seed`, `snapshot`, `ls`/`list`, `compile`, `freshness`, `build`, `docs generate`.\n- Nodes / resources = models, tests, sources, seeds, snapshots, exposures, analyses ŌĆö the objects making up dbt's **DAG (directed acyclic graph)**.\n- In dbt Core **1.11** the relevant flags include `--select`, `--exclude`, `--selector` (and `--defer` on run/test/build). `--select` shorthand is `-s`.\n- By default `dbt run` executes **all** models; `--select` runs a subset. Use quotes around selectors for POSIX safety.\n- Selection order: **selection methods** (e.g. `tag:`) ŌåÆ **graph operators** (e.g. `+`) ŌåÆ **set operators** (unions = space, intersections = comma, exclusions).\n- A `--select` argument can be a package name, model name, path to a directory of models, or a selection method (`path:`, `tag:`, `config:`, `test_type:`, `test_name:`, `selector:`).\n- **Graph operators** (DAG traversal shorthand):\n  - **plus `+`** ŌĆö `my_model+` selects the model **and all its children (descendants)**; `+my_model` selects the model **and all its parents (ancestors)**. A number limits depth, e.g. `1+model` / `model+1`.\n  - **at `@`** ŌĆö `@my_model` selects the model, its children, **and the parents of its children**.\n  - **asterisk `*`** ŌĆö wildcard (e.g. `finance.base.*`).\n  - **comma `,`** ŌĆö intersection (e.g. `path:marts/finance,tag:nightly,config.materialized:table`).\n- `dbt ls`/`list` previews what a selector will match (e.g. `dbt ls --select state:modified+`, `source_status:fresher+`).\n\n## Exam-relevant tokens\n`--select`, `-s`, `--exclude`, `--selector`, `--defer`, `+` (children/parents), `1+model`, `@`, `*`, `,` (intersection), space (union), `path:`, `tag:`, `config.materialized:table`, `source_status:fresher+`, `state:modified+`, `dbt ls`, DAG\n\n## Gotchas\n- `+` placement matters: trailing `model+` = descendants, leading `+model` = ancestors; a number caps the hops (`2+model`).\n- `@model` adds the parents of the model's children (useful so children build cleanly).\n- Use quotes around `--select` args for reliable cross-platform behavior; `--selector` ignores `--select`/`--exclude`.\n\nSource: [Syntax overview](https://docs.getdbt.com/reference/node-selection/syntax) ┬Ę raw: `docs__reference__node-selection__syntax.md`"}, {"id": "test-smarter-not-harder", "title": "Test smarter not harder: add the right tests to your dbt project", "url": "https://docs.getdbt.com/blog/test-smarter-not-harder", "domain": "05 ŌĆö Implementing dbt tests", "text": "# Test smarter not harder: add the right tests ŌĆö summary\n\n**What it covers:** a framework for *which* tests to add ŌĆö first define data quality, then prioritize which failures should fail the pipeline.\n\n## Key points\n\n- Testing is a phase of the **ADLC** (Analytics Development Lifecycle) and should **drive data quality**. Avoid both over-testing (alert fatigue / noise) and under-testing (only primary keys).\n- **Define data quality in three buckets:**\n  1. **Data hygiene** ŌĆö formatting, completeness, granularity; addressed in the **staging layer** (e.g. unique+not_null primary keys, columns that should always have text, valid email domains).\n  2. **Business-focused anomalies** ŌĆö data that differs from what's typical for the business; **human-set and fluid**, needing periodic re-tuning (e.g. \"sales change > 20% day-over-day\"). Identify by starting at the **BI layer**: pick 1ŌĆō3 dashboards and list expected behaviors.\n  3. **Stats-focused anomalies** ŌĆö volume/dimensional anomalies, values many standard deviations from the mean; more advanced, do after the first two.\n- **Prioritize by real-life impact.** Make a test **pipeline-failing (`error` severity)** if the concern is **customer-facing**, **used for financial decisions**, or **executive-facing**. Everything else is a \"nice-to-know\": set to **`warn`** or remove it.\n- A test should only exist if you can take a **specific action** when it fails. Keep a nice-to-know test (as a warning) only if you're gathering evidence for an action planned within ~6 months.\n- **Action plan:** write 1ŌĆō2 debugging steps per concern (consider adding to the test's `description`), then source ready-made tests from hub.getdbt.com ŌĆö `dbt-expectations` and `dbt_utils`. Keep the prioritized list as a living doc linked in the README.\n\n## Exam-relevant tokens\n\n`severity`, `error`, `warn`, `description`, ADLC, staging-layer hygiene, `dbt-expectations`, `dbt_utils`, customer-facing / financial / executive-facing ŌåÆ error\n\n## Gotchas\n\n- Severity choice is deliberate: only customer-facing / financial / executive-facing concerns warrant `error`; the rest are `warn` or untested.\n- Data-hygiene tests belong in **staging**; business anomalies are human-set and need re-tuning (e.g. during hypergrowth).\n- A test with no actionable response shouldn't exist.\n\nSource: [Test smarter not harder: add the right tests to your dbt project](https://docs.getdbt.com/blog/test-smarter-not-harder) ┬Ę raw: `docs__blog__test-smarter-not-harder.md`"}, {"id": "test-smarter-where-tests-should-go", "title": "Test smarter not harder: Where should tests go in your pipeline?", "url": "https://docs.getdbt.com/blog/test-smarter-where-tests-should-go", "domain": "05 ŌĆö Implementing dbt tests", "text": "# Test smarter not harder: where should tests go ŌĆö summary\n\n**What it covers:** *where* in the staging ŌåÆ intermediate ŌåÆ marts pipeline each kind of test belongs, including source freshness and CI/CD.\n\n## Key points\n\n- **At a glance:** source tests ŌåÆ fixable-at-the-source concerns; staging tests ŌåÆ business anomalies specific to individual tables; intermediate/marts tests ŌåÆ anomalies from joins/calculations + primary-key/not-null where grain matters.\n- **Sources:** apply tests that flag **fixable-at-the-source-system** issues (you can fix it or know who will). If a source issue isn't fixable, remove the test and mitigate in staging.\n  - **Source freshness:** run `dbt source freshness` in job commands for critical sources. If the source feeds a top-3 priority category, set severity **`error`** (job fails on stale data); otherwise **`warn`** and still run it.\n  - Hygiene fixable at source: removable duplicate records, enterable null names/emails, primary-key tests where duplicates are removable at source.\n- **Staging:** models clean up what can't be fixed at source; **tests focus on business-anomaly detection** (out-of-range values, values that should always be positive, unexpected volume upticks). **Don't test your own cleanup** (e.g. filtering nulls then re-adding `not_null`).\n- **Intermediate:** data hygiene + anomaly tests for **new** columns; don't re-test passthrough columns. Re-grained models ŌåÆ add a **primary key** test; first joins/aggregations ŌåÆ `accepted_values`, `mutually_exclusive_ranges` (dbt_utils), `not_constant` (dbt_utils). Complex SQL ŌåÆ consider **unit tests**.\n- **Marts:** same hygiene-or-anomaly pattern on **net-new** columns. **Unit tests** for especially complex transformation logic (date/forecasting math, CASE-WHEN-heavy segmentation); **primary key** tests where grain changed; business-anomaly tests on new calculated fields.\n- **CI/CD:** automate with **Slim CI** to optimize resources; use dbt Cloud **Advanced CI** \"compare changes\" (modified/added/removed) flags for confidence before peer review.\n\n## Exam-relevant tokens\n\n`dbt source freshness`, `severity` (`error` / `warn`), `not_null`, `accepted_values`, `mutually_exclusive_ranges`, `not_constant`, unit tests, primary-key tests, Slim CI, Advanced CI\n\n## Gotchas\n\n- Stale-data should **fail** the job (`error`) only for top-priority sources; otherwise `warn`.\n- Don't add `not_null` (or similar) to columns you just cleaned in staging ŌĆö it's redundant.\n- Test **new** columns at each layer; don't re-test passthrough columns carried down from upstream.\n\nSource: [Test smarter not harder: Where should tests go in your pipeline?](https://docs.getdbt.com/blog/test-smarter-where-tests-should-go) ┬Ę raw: `docs__blog__test-smarter-where-tests-should-go.md`"}, {"id": "test", "title": "About dbt test command", "url": "https://docs.getdbt.com/reference/commands/test", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# About dbt test command ŌĆö summary\n\n**What it covers:** `dbt test`, which runs data tests and unit tests against already-built resources.\n\n## Key points\n- `dbt test` runs **data tests** defined on models, sources, snapshots, and seeds, plus **unit tests** defined on SQL models. It expects those resources to already exist (built via other commands).\n- Select tests with `--select`:\n  - `dbt test` ŌĆö runs data and unit tests.\n  - `dbt test --select test_type:data` ŌĆö only data tests.\n  - `dbt test --select test_type:unit` ŌĆö only unit tests.\n  - `dbt test --select \"test_type:singular\"` ŌĆö singular data tests.\n  - `dbt test --select \"test_type:generic\"` ŌĆö generic data tests.\n  - `dbt test --select \"one_specific_model\"` / `\"some_package.*\"` ŌĆö scope to a model or package.\n  - Combine, e.g. `dbt test --select \"one_specific_model,test_type:data\"`.\n\n## Exam-relevant tokens\n`dbt test`, `--select`, `test_type:data`, `test_type:unit`, `test_type:singular`, `test_type:generic`, `some_package.*`.\n\n## Gotchas\n- `dbt test` does not build models/seeds/snapshots ŌĆö it tests existing resources. Use `dbt build` to build-and-test in one DAG pass.\n\nSource: [About dbt test command](https://docs.getdbt.com/reference/commands/test) ┬Ę raw: `docs__reference__commands__test.md`"}, {"id": "to-defer-or-to-clone", "title": "To defer or to clone, that is the question", "url": "https://docs.getdbt.com/blog/to-defer-or-to-clone", "domain": "04 ŌĆö Troubleshooting & optimizing pipelines", "text": "# To defer or to clone, that is the question ŌĆö summary\n\n**What it covers:** guidance on **when** to use `dbt clone` (shipped in dbt-core v1.6) versus **deferral**, beyond the docs on how to clone.\n\n## Key points\n- `dbt clone` leverages native **zero-copy clone** to copy entire schemas almost instantly for free: the warehouse copies only **metadata** (the pointer) sourceŌåÆtarget; the underlying data stays at rest. If zero-copy isn't available, dbt creates **pointer views** (`select * from my_model`).\n- Both clone and defer save cost by **bypassing expensive re-computation**, but:\n  - **clone** *eagerly copies* an entire schema into the target;\n  - **defer** *lazily references* pre-built models in the source schema.\n- First-order differences:\n  - **How used:** defer is implicit via the `--defer` flag; clone is explicit via the `dbt clone` command.\n  - **Outputs:** defer creates no objects itself; clone copies objects into the target schema, **persisted** afterward.\n  - **How it works:** defer compares manifests and overrides `ref` to resolve unbuilt models to the source run's objects; clone copies objects via zero-copy (or pointer views).\n- Second-order differentiators: clone's target objects are usable in **any downstream tool (BI)** and can be **safely modified** (sandbox of prod), but they **drift** from source (point-in-time) and support only **one source ŌåÆ one target**. Defer's objects are usable **only within dbt**, must **not** be modified (would touch prod data), **never drift** (always latest source), and can mix **multiple dynamic sources** (prod + staging).\n- Rule of thumb: **deferral suits CI; cloning suits CD**. They can be combined across the deployment lifecycle.\n\n## Exam-relevant tokens\n`dbt clone`, `--defer`, zero-copy clone, pointer view, metadata copy, `ref` override, manifest comparison, data drift, point-in-time copy, CI vs CD\n\n## Gotchas\n- Defer never drifts (always points at latest source) but clone is a **point-in-time** copy that **will** drift.\n- Defer can dynamically mix multiple source schemas; clone is strictly one source ŌåÆ one target.\n- Modifying defer's target objects would alter **prod data**; clone gives a safe, cheap sandbox copy you can modify.\n\nSource: [To defer or to clone, that is the question](https://docs.getdbt.com/blog/to-defer-or-to-clone) ┬Ę raw: `docs__blog__to-defer-or-to-clone.md`"}, {"id": "unit-tests", "title": "Unit tests", "url": "https://docs.getdbt.com/docs/build/unit-tests", "domain": "05 ŌĆö Implementing dbt tests", "text": "# Unit tests ŌĆö summary\n\n**What it covers:** validating SQL modeling logic on small static inputs **before** materializing a model; when/where to use unit tests, their YAML shape, and exit codes.\n\n## Key points\n\n- Unit tests validate modeling **logic** against static `given` inputs and an `expect`ed output **before** the model is built ŌĆö enabling test-driven development. Contrast: data tests run **after** a model is built.\n- Defined under the `unit_tests:` key in YAML, with `name`, `model`, `given` (a list of `input:` + `rows`), and `expect`. Mock data formats: `dict`, `csv`, or `sql` (inline or in a `fixtures/` subdirectory of a test path).\n- **Where YAML lives:** unit test definitions live under `model-paths` (e.g. `models/`), not in `tests/`.\n- **When to add one:** complex SQL ŌĆö regex, date math, window functions, many-branch `case when`, truncation; custom function-like logic; previously-buggy logic; edge cases; before a significant refactor; high-criticality (public/contracted/upstream-of-exposure) models. **Don't** unit test warehouse functions like `min()`.\n- **When to run:** dev and CI only ŌĆö inputs are static so running in production wastes compute. Exclude from prod builds with `--exclude-resource-type` or the `DBT_ENGINE_EXCLUDE_RESOURCE_TYPES` env var (1.11; `DBT_EXCLUDE_RESOURCE_TYPES` in Ōēż1.10).\n- **Run only unit tests:** `dbt test --select \"test_type:unit\"`. Also `dbt test --select \"dim_customers,test_type:unit\"` or by name `dbt test --select <unit_test_name>`.\n- **Direct parents must already exist** in the warehouse before a unit test runs. Use `--empty` to build empty versions cheaply, e.g. `dbt run --select \"stg_customers top_level_email_domains\" --empty`. `dbt build` runs unit tests ŌåÆ materializes ŌåÆ runs data tests in lineage order.\n- **Incremental models:** override `is_incremental` (and macros/vars/env vars) per test to cover full-refresh vs incremental modes. Expected output = the **result of the materialization** (what's merged/inserted), not the final table.\n- Models depending on **ephemeral** models must use `format: sql` for that input.\n\n## Exam-relevant tokens\n\n`unit_tests:`, `given`, `input`, `expect`, `format: dict|csv|sql`, `fixtures`, `test_type:unit`, `--empty`, `dbt build`, `overrides`, `is_incremental`, `--exclude-resource-type`, `DBT_ENGINE_EXCLUDE_RESOURCE_TYPES`\n\n## Gotchas\n\n- **Exit codes:** a unit test is one test case ŌåÆ result is always **0 (pass)** or **1 (fail)** regardless of failing-row count. Data tests instead report the **number of failing records**.\n- Unit test YAML in `tests/` won't be picked up ŌĆö it must be under `model-paths`.\n\nSource: [Unit tests](https://docs.getdbt.com/docs/build/unit-tests) ┬Ę raw: `docs__docs__build__unit-tests.md`"}, {"id": "versions", "title": "versions (resource property)", "url": "https://docs.getdbt.com/reference/resource-properties/versions", "domain": "02 ŌĆö Managing dbt models governance", "text": "# versions (resource property) ŌĆö summary\n\n**What it covers:** the `versions` YAML property reference ŌĆö `v`, `defined_in`, `alias`, `include`/`exclude`, and breaking-change detection.\n\n## Key points\n\n- Each entry under `versions:` needs a **`v`** (required version identifier). Optional per-version `defined_in`, `columns`, `config`.\n- **`v`**: numeric (int/float) or any string. Used to **order** versions. If `latest_version` is unset, the **highest** value is latest. Recommend simple major versioning (`1`, `2`, `3`). Do **not** include the letter `v` in the identifier ŌĆö dbt adds it.\n- **`defined_in`**: model file name (no extension) where the version lives. Default search is `<model_name>_v<v>`; the latest may also be `<model_name>` (no suffix). File names must be **globally unique**.\n- **`alias`**: default resolved alias is `<model_name>_v<v>` (via `generate_alias_name`). Override in version YAML or by reimplementing the macro. `defined_in` and `alias` are independent.\n- **`include` / `exclude`** (which top-level `columns` a version uses):\n  - `include`: list of column names, or `'*'` / `'all'` for all top-level columns.\n  - `exclude`: list of columns to drop ŌĆö **only** allowed when `include` is `'*'`/`'all'`.\n  - At most **one** `include`/`exclude` element in a version's `columns` list. Default is `include: all`, `exclude: []`.\n  - If no version specifies columns, you can omit `columns` entirely and all top-level columns apply.\n  - A version-specific column whose `name` matches a top-level one **overrides** it for that version.\n\n## Detecting breaking changes\n\n- With `state:modified` in Slim CI, dbt detects changes to **versioned/contracted** model contracts and errors on potentially breaking changes.\n- Breaking examples: removing contract enforcement, removed columns, removed enforced constraints, materialization change with enforced constraints, `data_type` changes.\n- **Additive (non-breaking):** adding a new column to a contracted model; adding new `constraints` to an existing column.\n\n## Exam-relevant tokens\n\n`versions`, `v`, `defined_in`, `alias`, `include`, `exclude`, `'*'`/`'all'`, `latest_version`, `state:modified`, `generate_alias_name`\n\n## Gotchas\n\n- `exclude` requires `include: '*'`/`'all'` ŌĆö you can't `exclude` from a hand-listed include.\n- A version with `include: []` includes **none** of the top-level columns (must then declare its own).\n- Without `latest_version`, the highest `v` wins as latest.\n\nSource: [versions (resource property)](https://docs.getdbt.com/reference/resource-properties/versions) ┬Ę raw: `docs__reference__resource-properties__versions.md`"}, {"id": "viewpoint", "title": "The dbt Viewpoint", "url": "https://docs.getdbt.com/community/resources/viewpoint", "domain": "01 ŌĆö Developing & optimizing dbt models", "text": "# The dbt Viewpoint ŌĆö summary\n\n**What it covers:** the foundational philosophy behind dbt ŌĆö applying software-engineering workflow practices to analytics, including modularity.\n\n## Key points\n- Mature analytics has shifted from proprietary end-to-end tools to **composable solutions**: data integration tools, high-performance analytic databases, SQL/R/Python, and visualization tools.\n- Core thesis: analytics teams have a **workflow problem** (siloed knowledge, rewritten analyses, inconsistent metric definitions); the fix is to borrow software-engineering practices.\n- A mature analytics workflow should be **collaborative**, with:\n  - **Version Control** ŌĆö analytic code (SQL/Python/etc.) should be version controlled so you know who changed what, when.\n  - **Quality Assurance** ŌĆö any code that generates data/analysis should be reviewed and tested.\n  - **Documentation** ŌĆö your analysis is a software application; ship it with descriptions of how to interpret it.\n  - **Modularity** ŌĆö don't copy-paste; if a definition changes it must update everywhere. Treat a dataset's **schema as its public interface**; create tables/views that expose a consistent schema and can be modified if business logic changes.\n- **Analytic code is an asset**, so the workflow needs: multiple **Environments** (dev vs prod), **Service level guarantees** (stand behind production accuracy; deprecate retired code), and **Design for maintainability** (anticipate schema/data changes).\n- Analytics workflows require **automated tooling** ŌĆö the whole build (download, configure for environment, test, deploy) should run with a **single command**.\n\n## Exam-relevant tokens\nmodularity, version control, quality assurance, documentation, environments, service level guarantees, maintainability, \"schema as public interface\", DRY, single-command automation\n\n## Gotchas\n- The Viewpoint is the conceptual root of DRY/modularity in dbt: reuse the same input data, treat schema as a public interface, never copy-paste definitions.\n- It frames testing, docs, version control, and environments as first-class analytics requirements, not optional extras.\n\nSource: [The dbt Viewpoint](https://docs.getdbt.com/community/resources/viewpoint) ┬Ę raw: `docs__community__resources__viewpoint.md`"}, {"id": "writing-custom-generic-tests", "title": "Writing custom generic data tests", "url": "https://docs.getdbt.com/best-practices/writing-custom-generic-tests", "domain": "05 ŌĆö Implementing dbt tests", "text": "# Writing custom generic data tests ŌĆö summary\n\n**What it covers:** how to author your own generic (\"schema\") tests as `{% test %}` blocks, standard vs extra arguments, default configs, and overriding built-ins.\n\n## Key points\n\n- The four built-ins (`not_null`, `unique`, `relationships`, `accepted_values`) are themselves `test` blocks (formerly \"schema tests\"). You can write your own.\n- Custom generic tests are SQL files that live in **`tests/generic/`** (a `generic` subfolder of your `test-paths`) **or** in **`macros/`** (handy when the test depends on complex macro logic).\n- Define with `{% test <test_name>(model, column_name) %} ... {% endtest %}`. Standard arguments: `model` (always named `model`, even for sources/seeds/snapshots ŌĆö templated to the relation) and `column_name` (only if the test is column-level). The test passes when the `select` returns **zero rows**.\n- Use it by name in a resource's `data_tests:` property; dbt passes the resource as `model` and the column as `column_name`.\n- **Additional arguments:** add them to the signature (e.g. `relationships(model, column_name, field, to)`) and supply them from YAML under `arguments:` (v1.10.5+; older versions set them as top-level properties).\n- **Default config values:** put a `{{ config(...) }}` block inside the test block (e.g. `{{ config(severity = 'warn') }}`) to set defaults for every instance; a specific instance's `.yml` config overrides it.\n- **Override a built-in:** add a `test` block with the same name (e.g. `{% test unique(model, column_name) %}`) in your project and dbt favors yours over the global one.\n- **Documenting the test macro:** add a `description` under `macros:` in a `schema.yml`; prefix the macro name with `test_` (a block named `not_empty_string` ŌåÆ macro `test_not_empty_string`). You can describe each argument.\n\n## Exam-relevant tokens\n\n`{% test %}`, `{% endtest %}`, `model`, `column_name`, `field`, `to`, `arguments:`, `tests/generic/`, `macros/`, `config(severity='warn')`, `test_` prefix, override built-in tests\n\n## Gotchas\n\n- The `model` argument is **always** called `model` even when the tested resource is a source, seed, or snapshot.\n- To document the macro logic, the macro name needs the `test_` prefix; the test block name does not.\n- A generic test's `{{ config() }}` defaults are overridden by the specific instance's YAML config.\n\nSource: [Writing custom generic data tests](https://docs.getdbt.com/best-practices/writing-custom-generic-tests) ┬Ę raw: `docs__best-practices__writing-custom-generic-tests.md`"}], EXAM={"logistics": {"version": "dbt Core 1.11", "questions": 65, "duration": "2 hours", "pass": "65%", "format": "Online proctored", "price": "$200", "languages": "English & Japanese", "expires": "2 years"}, "formats": [{"n": "Multiple choice", "d": "Pick one or more correct options from a list (supports select-all-that-apply)."}, {"n": "Fill in the blank", "d": "Complete a statement using dropdowns or short-answer fields."}, {"n": "Matching", "d": "Pair items from two sets (e.g. selector method to what it selects)."}, {"n": "Hot spot", "d": "Click the correct area on an image / code block."}, {"n": "Build list", "d": "Arrange items into the correct order or sequence."}, {"n": "DOMC", "d": "Discrete Option Multiple Choice: options appear one at a time with YES/NO; a single wrong response fails the item, forward-only."}], "domains": [{"id": "01", "name": "Developing & optimizing dbt models", "count": 28, "subs"
