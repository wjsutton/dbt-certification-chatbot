name: refresh-docs
on:
  schedule:
    - cron: "0 6 * * 1"      # Mondays 06:00 UTC
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Re-extract dbt docs
        run: python extract_dbt_docs.py
      - name: Rebuild wiki (incremental) + report stale summaries
        run: python build_llm_wiki.py | tee build-report.txt
      - name: Validate question bank (grounding gate)
        run: python quiz/validate_bank.py
      - name: Open PR with changes
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/docs-refresh
          title: "chore: dbt docs refresh"
          commit-message: "chore: refresh dbt docs + wiki"
          body-path: build-report.txt
          labels: docs-refresh
