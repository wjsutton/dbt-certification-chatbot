: ["Identifying & verifying raw object dependencies", "Understanding core dbt materializations", "Modularity & DRY principles", "Commands: build, run, test, docs, show, snapshot, seed", "Logical flow of models & clean DAGs", "Defining configurations in dbt_project.yml", "Using dbt Packages", "Creating Python Models", "Providing access with the grants config", "Creating snapshots in YAML", "Selecting the optimal incremental strategy", "Validating logic/schema in dry-runs (--empty flag)", "Running models in sample mode (--sample flag)", "Advanced materializations such as microbatch"]}, {"id": "02", "name": "Managing dbt models governance", "count": 10, "subs": ["Adding contracts to ensure model shape", "Creating model versions & deprecating old ones", "Defining constraints in YAML for data integrity", "Model governance overview", "Data product management (reading)"]}, {"id": "03", "name": "Debugging data modeling errors", "count": 9, "subs": ["Understanding logged error messages", "Troubleshooting using compiled code", "Troubleshooting .yml compilation errors", "Developing, implementing & testing a fix before merge", "Managing dbt behavior with flags"]}, {"id": "04", "name": "Troubleshooting & optimizing pipelines", "count": 4, "subs": ["Troubleshooting & managing failure points in the DAG", "Using dbt clone"]}, {"id": "05", "name": "Implementing dbt tests", "count": 6, "subs": ["Generic, singular, custom, custom generic & unit tests", "Testing assumptions for models and sources", "Implementing testing steps in the workflow"]}, {"id": "06", "name": "External dependencies", "count": 4, "subs": ["Implementing dbt exposures", "Implementing source freshness"]}, {"id": "07", "name": "Leveraging the dbt state", "count": 4, "subs": ["Understanding state & state selection", "Using dbt retry"]}]};

const md=s=>{s=esc(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  return s.split(/\n{2,}/).map(p=>{ if(/^[-*] /m.test(p)){return '<ul>'+p.split(/\n/).map(l=>l.replace(/^[-*]\s?/,'')).filter(Boolean).map(li=>'<li>'+li+'</li>').join('')+'</ul>';} return '<p>'+p.replace(/\n/g,'<br>')+'</p>';}).join('');};

const STOP=new Set("the a an of to in for on and or is are with how what which when use using your you it its as be by give me random question hard easy medium uber".split(" "));
function rank(q){const ts=(q.toLowerCase().match(/[a-z0-9_:+.-]+/g)||[]).filter(t=>!STOP.has(t)&&t.length>1);
  const sc=SUMMARIES.map(s=>{const h=(s.title+" "+s.id+" "+s.text).toLowerCase();let n=0;ts.forEach(t=>{const c=h.split(t).length-1;n+=c*((s.title.toLowerCase().includes(t)||s.id.includes(t))?3:1);});return{s,n};}).sort((a,b)=>b.n-a.n);
  let top=sc.filter(x=>x.n>0).slice(0,4).map(x=>x.s);if(!top.length)top=shuffle(SUMMARIES).slice(0,3);return top;}
function genPrompt(topic,diff,fmt){
  const fl=fmt==='auto'?'Choose the single best-fitting format from mcq, fitb, matching, build_list, domc.':'Use format: '+fmt+'.';
  const dl=diff==='uber-hard'?'Difficulty: VERY HARD ŌĆö a multi-step scenario with subtle, plausible distractors; prefer mcq with multiple correct (select_all), domc, or build_list.':'Difficulty: '+diff+'.';
  return ["You are an exam item writer for the dbt Analytics Engineering Certification (dbt Core 1.11).",
   'Using ONLY facts in the provided SOURCES, write exactly ONE practice question about: "'+topic+'".',dl,fl,
   "Return ONLY a JSON object (no markdown fences/commentary): { \"format\":\"mcq|fitb|matching|build_list|domc|hotspot\", \"difficulty\":\""+diff+"\", \"stem\":\"...\", \"rationale\":\"1-2 sentence exam-accurate why\", ...format fields... }",

function extractJSON(t){if(typeof t!=='string')t=(t&&(t.text||t.output||t.completion))||JSON.stringify(t);

function newAns(it){if(it.format==='mcq')return{sel:[]};if(it.format==='fitb')return{vals:{}};if(it.format==='matching')return{map:{}};
  if(it.format==='build_list')return{order:shuffle((it.items||[]).map(x=>x.id))};
  if(it.format==='domc'){const opts=shuffle(it.options||[]);const want=Math.max(5,Math.min(8,it.present_n||6));return{queue:opts.slice(0,Math.min(want,opts.length)),step:0,done:false,correct:null};}if(it.format==='hotspot')return{sel:[]};return{};}
function grade(it,A){if(it.format==='mcq'){const c=new Set((it.options||[]).filter(o=>o.correct).map(o=>o.id));const s=new Set(A.sel||[]);return c.size===s.size&&[...c].every(x=>s.has(x));}
  if(it.format==='fitb')return (it.blanks||[]).every(b=>{const v=(A.vals||{})[b.id]||'';return b.type==='dropdown'?v===b.answer:(b.accepted||[]).map(x=>x.trim().toLowerCase()).includes(v.trim().toLowerCase());});
  if(it.format==='matching')return (it.left||[]).every(l=>(A.map||{})[l]===it.key[l]);
  if(it.format==='build_list')return JSON.stringify(A.order)===JSON.stringify((it.answer||{}).order||[]);
  if(it.format==='domc')return !!A.correct;if(it.format==='hotspot'){const c=new Set(it.correct||[]);const s=new Set(A.sel||[]);return c.size===s.size&&[...c].every(x=>s.has(x));}return false;}

function qwRender(it,A,body,onChange,onDone){

    (it.stem||'').split(/(\{\{[a-z0-9]+\}\})/i).forEach(seg=>{const m=seg.match(/^\{\{([a-z0-9]+)\}\}$/i);
      if(m){const bl=(it.blanks||[]).find(x=>x.id===m[1])||{id:m[1],type:'short_answer'};let el;

    if(!tmpl)(it.blanks||[]).forEach(bl=>{const el=document.createElement('input');el.type='text';el.className='blank';el.placeholder=bl.id;el.value=(A.vals||{})[bl.id]||'';el.style.marginTop='8px';el.oninput=()=>{A.vals[bl.id]=el.value;onChange();};body.appendChild(el);});}

  else if(fmt==='build_list'){const ul=document.createElement('ul');ul.className='build';
    const draw=()=>{ul.innerHTML='';A.order.forEach((id,i)=>{const item=(it.items||[]).find(x=>x.id===id)||{text:id};const li=document.createElement('li');
      li.innerHTML='<button data-u>Ō¢▓</button><button data-d>Ō¢╝</button><div><span class="mut">'+(i+1)+'.</span> '+md(item.text)+'</div>';
      li.querySelector('[data-u]').onclick=()=>{if(i>0){[A.order[i-1],A.order[i]]=[A.order[i],A.order[i-1]];A._touched=true;draw();onChange();}};
      li.querySelector('[data-d]').onclick=()=>{if(i<A.order.length-1){[A.order[i+1],A.order[i]]=[A.order[i],A.order[i+1]];A._touched=true;draw();onChange();}};ul.appendChild(li);});};
    draw();body.appendChild(ul);}
  else if(fmt==='hotspot'){const max=it.num_selections||1;let html=esc(it.code||'');
    (it.hotspots||[]).forEach(h=>{const x=esc(h.text||'');if(!x)return;html=html.replace(x,'<span class="hot'+((A.sel||[]).includes(h.id)?' picked':'')+'" data-h="'+h.id+'">'+x+'</span>');});

    pre.querySelectorAll('.hot').forEach(sp=>sp.onclick=()=>{const id=sp.dataset.h,j=A.sel.indexOf(id);if(j>=0){A.sel.splice(j,1);sp.classList.remove('picked');}else{if(A.sel.length>=max)return;A.sel.push(id);sp.classList.add('picked');}onChange();});}
  else if(fmt==='domc'){const step=()=>{
      if(A.done){body.innerHTML='<p class="mut">Answered ŌĆö <span class="pill '+(A.correct?'good':'bad')+'">'+(A.correct?'correct':'incorrect')+'</span></p>';onChange();if(onDone)onDone();return;}
      const opt=A.queue[A.step];body.innerHTML='<p class="small mut">DOMC ŌĆö answer YES/NO. One wrong response fails the item; no going back.</p><div style="border:1px solid var(--line);border-radius:8px;padding:10px;background:var(--field);margin:6px 0"><strong>'+md(opt.text)+'</strong></div>';
      const d=document.createElement('div');d.className='dombtns';const ans=yes=>{const good=yes===!!opt.correct;if(!good){A.done=true;A.correct=false;}else{A.step++;if(A.step>=A.queue.length){A.done=true;A.correct=true;}}onChange();step();};
      const y=document.createElement('button');y.className='primary';y.textContent='YES';y.onclick=()=>ans(true);const n=document.createElement('button');n.textContent='NO';n.onclick=()=>ans(false);d.append(y,n);body.appendChild(d);};step();}
  else{body.textContent='(unsupported format)';}
}
function renderCard(bubble,it,onGraded){

function testTopic(){const sc=SESS.scope||{type:'all'};
  if(sc.type==='sub')return{d:sc.d,sub:sc.name};

  const fail=(msg)=>{b.innerHTML='<div class="err">'+esc(msg||'Could not generate this one.')+'</div>';
    const w=document.createElement('div');w.className='chips';
    const r=document.createElement('button');r.className='chip';r.textContent='Try again';r.onclick=()=>{SESS.n--;b.remove();testPresent();};
    const s=document.createElement('button');s.className='skipbtn';s.textContent='Skip ŌåÆ';s.onclick=skip;
    w.append(r,s);b.appendChild(w);scroll();};
  let q;
  try{const pending=SESS.pending;SESS.pending=null;q=pending?await pending:await testGen(testGenSpec());}
  catch(e){return fail('Could not generate this one. '+((e&&e.message)||''));}
  if(!q||!q.it||!q.it.format)return fail('That question came back malformed ŌĆö tap Try again.');
  SESS.cur={topic:q.spec.topic,domainId:q.spec.domainId,domainName:q.spec.domainName,item:q.it};setStatus();SESS.awaiting='card';
  try{renderCard(b,q.it,(ok)=>onTestGraded(b,ok));}
  catch(e){return fail('Could not display this question ŌĆö tap Try again.');}
  const ctl=b.querySelector('.ctl');
  if(ctl){const sk=document.createElement('button');sk.className='skipbtn';sk.textContent='Skip ŌåÆ';sk.onclick=skip;ctl.appendChild(sk);}
  if(SESS.n<SESS.len&&!SESS.pending){SESS.pending=testGen(testGenSpec()).catch(()=>null);}
  scroll();}
function onTestGraded(b,ok){
  SESS.log.push({topic:SESS.cur.topic,domainId:SESS.cur.domainId,domainName:SESS.cur.domainName,verdict:ok?'correct':'incorrect'});
  SESS.awaiting='discuss';
  const last=SESS.n>=SESS.len;
  const c=document.createElement('div');c.className='chips';
  const nb=document.createElement('button');nb.className='chip primary';nb.textContent=last?'See my results ŌåÆ':'Next question ŌåÆ';
  nb.onclick=()=>{SESS.awaiting=false;testPresent();};
  const hint=document.createElement('span');hint.textContent='ŌĆ”or ask a follow-up below';hint.style.cssText='align-self:center;color:var(--mut);font-size:12px';
  c.appendChild(nb);c.appendChild(hint);b.appendChild(c);scroll();}
function renderTestQ(b,it){let h='';
  if(it.format==='fitb')h+='<div class="qstem">'+md((it.stem||'').replace(/\{\{[a-z0-9]+\}\}/ig,' ____ '))+'</div>';
  else h+='<div class="qstem">'+md(it.stem||'')+'</div>';
  if(it.format==='mcq')h+='<div class="qopts">'+(it.options||[]).map((o,i)=>'<div class="qopt"><span class="qletter">'+String.fromCharCode(65+i)+'.</span>'+md(o.text)+'</div>').join('')+'</div>';
  h+='<p class="qhint">'+(it.format==='mcq'?(it.select_all?'Select all that apply. ':'')+'Type the letter(s) ŌĆö or explain your reasoning ŌĆö below.':'Type your answer below.')+'</p>';
  b.innerHTML=h;scroll();}
function qText(it){let s=it.stem||'';if(it.format==='mcq')s+='\nOptions:\n'+(it.options||[]).map((o,i)=>String.fromCharCode(65+i)+'. '+o.text).join('\n');return s;}
function ansKeyText(it){
  if(it.format==='mcq')return (it.options||[]).map((o,i)=>({l:String.fromCharCode(65+i),o})).filter(x=>x.o.correct).map(x=>x.l+'. '+x.o.text).join(' AND ');
  if(it.format==='fitb')return (it.blanks||[]).map(x=>(x.answer||(x.accepted||[]).join(' / '))).join('; ');
  if(it.format==='matching')return Object.entries(it.key||{}).map(([k,v])=>k+' -> '+v).join('; ');
  if(it.format==='build_list')return ((it.answer||{}).order||[]).map(id=>((it.items||[]).find(x=>x.id===id)||{}).text||id).join(' -> ');
  if(it.format==='hotspot')return (it.hotspots||[]).filter(h=>(it.correct||[]).includes(h.id)).map(h=>h.text).join(', ');
  return '';}
function parseVerdict(out){const m=(out||'').match(/verdict:\s*(correct|partially correct|partial|incorrect|wrong)/i);if(!m)return'partial';const v=m[1].toLowerCase();if(v==='correct')return'correct';if(v.indexOf('partial')===0)return'partial';return'incorrect';}
function askClaudeSafe(prompt,data){if(!(window.cowork&&window.cowork.askClaude))return Promise.reject(new Error('Open inside Cowork ŌĆö needs window.cowork.askClaude.'));return pTimeout(window.cowork.askClaude(prompt,data||[]),60000,'Response');}
async function testAnswer(text){addUser(text);const it=SESS.cur.item;SESS.awaiting='busy';const b=addBot('<span class="spin"></span> ŌĆ”');
  const data=(it._sources||[]).map(p=>({title:p.title,url:p.url,content:p.text}));
  const prompt="You are a warm, encouraging dbt Analytics Engineering certification tutor (dbt Core 1.11). A learner is doing a practice question. Use ONLY the SOURCES for facts and use exact dbt tokens (commands, flags, YAML keys, configs).\n\nQUESTION:\n"+qText(it)+"\n\nTHE CORRECT ANSWER: "+ansKeyText(it)+"\n\nLEARNER'S ANSWER: "+text+"\n\nRespond EXACTLY in this shape:\n- First line: 'Verdict: Correct' or 'Verdict: Partially correct' or 'Verdict: Incorrect'.\n- Then a friendly explanation. For multiple-choice, go through EACH option (A, B, C...) and say why it is correct or incorrect. For other formats, explain the right answer and where they went well or astray.\n- Be concise and exam-focused; name the source title(s) you used.\n- End with a short line inviting them to ask a follow-up about this question, or hit 'Next question'.";
  try{const out=await askClaudeSafe(prompt,data);SESS.log.push({topic:SESS.cur.topic,domainId:SESS.cur.domainId,domainName:SESS.cur.domainName,verdict:parseVerdict(out)});b.innerHTML=md(out);}
  catch(e){b.innerHTML='<div class="err">'+esc(e.message||'error')+'</div>';SESS.log.push({topic:SESS.cur.topic,domainId:SESS.cur.domainId,domainName:SESS.cur.domainName,verdict:'partial'});}
  testControls(b,it);SESS.awaiting='discuss';}
async function testDiscuss(text){addUser(text);const it=SESS.cur.item;SESS.awaiting='busy';const b=addBot('<span class="spin"></span> ŌĆ”');
  const data=(it._sources||[]).map(p=>({title:p.title,url:p.url,content:p.text}));
  const prompt="You are a dbt cert tutor (dbt Core 1.11). The learner is discussing this practice question:\n"+qText(it)+"\nCorrect answer: "+ansKeyText(it)+"\n\nTheir follow-up: "+text+"\n\nAnswer using ONLY the SOURCES, with exact dbt tokens; cite source title(s). Keep it concise. End by inviting another follow-up or hitting 'Next question'.";
  try{const out=await askClaudeSafe(prompt,data);b.innerHTML=md(out);}catch(e){b.innerHTML='<div class="err">'+esc(e.message||'error')+'</div>';}
  testControls(b,it);SESS.awaiting='discuss';}
function testControls(b,it){const c=document.createElement('div');c.className='chips';const last=SESS.n>=SESS.len;
  c.innerHTML=(it._sources||[]).slice(0,3).map(s=>'<a class="chip" href="'+esc(s.url)+'" target="_blank" rel="noopener">ŌåŚ '+esc((s.title||'source').slice(0,42))+'</a>').join('')
   +'<button class="chip primary" id="nextq">'+(last?'See my results ŌåÆ':'Next question ŌåÆ')+'</button>';
  b.appendChild(c);document.getElementById('nextq').onclick=()=>{SESS.awaiting=false;testPresent();};scroll();}
async function testFinish(){const total=SESS.len,log=SESS.log;const correct=log.filter(l=>l.verdict==='correct').length;const weak=log.filter(l=>l.verdict!=='correct');
  setStatus();const b=addBot('<span class="spin"></span> Putting your feedback togetherŌĆ”');
  const seen=new Set(),data=[];weak.forEach(w=>{rank(w.topic).forEach(p=>{if(!seen.has(p.url)){seen.add(p.url);data.push({title:p.title,url:p.url,content:p.text});}});});
  const results=log.map((l,i)=>(i+1)+'. '+l.domainId+' '+l.domainName+' / '+l.topic+' ŌĆö '+l.verdict).join('\n');
  const prompt="You are an encouraging dbt Analytics Engineering cert coach. A learner just finished a "+total+"-question practice test at '"+(DIFFLABEL[SESS.diff]||SESS.diff)+"' difficulty and scored "+correct+"/"+total+" correct.\nResults:\n"+results+"\n\nWrite a short, warm, motivational wrap-up: celebrate what went well; name the specific domains/topics to focus on (only the partial/incorrect ones); then give 2-4 concrete 'key points to review' using exact dbt tokens, grounded ONLY in the SOURCES. Do not invent facts. Keep it tight and uplifting.";
  try{const out=await askClaudeSafe(prompt,data.slice(0,6));b.innerHTML=md(out);}
  catch(e){b.innerHTML=md("**Nice work finishing!** You scored **"+correct+"/"+total+"**. "+(weak.length?"Focus next on: "+[...new Set(weak.map(w=>w.domainId+' '+w.domainName))].join(', ')+'.':"Clean sweep!"));}
  const c=document.createElement('div');c.className='chips';const allCorrect=correct===total&&total>0;let btns='';
  if(allCorrect&&SESS.diff!=='uber')btns+='<button class="chip primary" data-fin="uber">Try uber-hard ŌåÆ</button>';
  btns+='<button class="chip" data-fin="new">New test</button><button class="chip" data-fin="mock">Full mock exam</button>';
  c.innerHTML=btns;b.appendChild(c);const sc=SESS.scope,len=SESS.len;
  const u=c.querySelector('[data-fin="uber"]');if(u)u.onclick=()=>{thread.innerHTML='';startQuiz('test',len,{diff:'uber',scope:sc});};
  c.querySelector('[data-fin="new"]').onclick=()=>{SESS=null;setStatus();thread.innerHTML='';appEl.classList.add('hidden');showSub('test');};
  c.querySelector('[data-fin="mock"]').onclick=()=>{SESS=null;setStatus();thread.innerHTML='';appEl.classList.add('hidden');showSub('mock');};
  scroll();}
</script></body></html>
